kind = "web"
previewPath = "/"
title = "MOGGED.AI"
version = "1.0.0"
id = "artifacts/mogged"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26235

[services.development]
run = "pnpm --filter @workspace/mogged run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mogged", "run", "build" ]
publicDir = "artifacts/mogged/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26235"
BASE_PATH = "/"
